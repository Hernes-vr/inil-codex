<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta property="og:title" content="惑星イニル — Novels">
<meta property="og:description" content="惑星イニルの物語。全13作品。">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>惑星イニル — Novels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#06070c;--bg-card:#0c0e18;--border:rgba(255,255,255,0.05);--amber:#e0a535;--teal:#4eb8d6;--purple:#7e8fd4;--rose:#c47a7a;--green:#7ab89a;--text:#e0dcd4;--text-mid:rgba(255,255,255,0.65);--text-dim:rgba(255,255,255,0.45);--text-ghost:rgba(255,255,255,0.22);--serif:'Noto Serif JP','Cormorant Garamond',serif;--sans:'Noto Sans JP',sans-serif;--display:'Cormorant Garamond','Noto Serif JP',serif}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;background:var(--bg)}body{font-family:var(--sans);color:var(--text);background:var(--bg);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
#progress{position:fixed;top:0;left:0;height:2px;z-index:1000;background:linear-gradient(90deg,var(--amber),var(--teal));width:0%;transition:width .15s}
.site-header{position:fixed;top:0;left:0;right:0;z-index:900;background:rgba(6,7,12,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.site-header h1{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--text-mid);letter-spacing:.04em;cursor:pointer}.site-header a{color:var(--text-dim);text-decoration:none;font-size:13px;transition:color .2s}.site-header a:hover{color:var(--teal)}
.hero{min-height:auto;display:flex;flex-direction:column;align-items:center;text-align:center;padding:100px 24px 60px}
.hero .universe-tag{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:24px}
.hero h2{font-family:var(--display);font-size:clamp(24px,4vw,36px);font-weight:600;color:var(--text);line-height:1.3;margin-bottom:40px}
.section-hint{font-family:var(--sans);font-size:12px;color:var(--text-dim);max-width:900px;margin:-4px auto 16px;padding:0 24px;text-align:left;line-height:1.6}
.section-label{font-family:var(--sans);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);margin:32px auto 12px;max-width:900px;padding:0 24px;text-align:left}
.wl-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:900px;margin:0 auto;padding:0 24px 16px}
.wl-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:24px 22px;width:280px;text-align:left;cursor:pointer;transition:all .3s}
.wl-card:hover{border-color:var(--amber);transform:translateY(-2px)}
.wl-card .wl-num{font-family:var(--sans);font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;color:var(--text-dim)}
.wl-card .wl-title{font-family:var(--serif);font-size:17px;color:var(--text);margin-bottom:8px}
.wl-card .wl-desc{font-size:12px;color:var(--text-mid);line-height:1.6}
.wl-card.cat-start .wl-num{color:var(--teal)}.wl-card.cat-after .wl-num{color:var(--purple)}.wl-card.cat-any .wl-num{color:var(--green)}.wl-card.cat-deep .wl-num{color:var(--ember)}
.toc{max-width:640px;margin:0 auto;padding:40px 24px 80px;display:none}
.toc h3{font-family:var(--serif);font-size:14px;color:var(--text-dim);letter-spacing:.15em;margin-bottom:8px}
.toc .toc-subtitle{font-family:var(--serif);font-size:18px;color:var(--text-mid);margin-bottom:24px}
.toc .back-btn{font-size:12px;color:var(--text-dim);background:none;border:none;cursor:pointer;margin-bottom:20px;padding:4px 0}.toc .back-btn:hover{color:var(--teal)}
.toc-item{display:flex;align-items:baseline;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s}
.toc-item:hover{padding-left:8px}.toc-item .num{font-family:var(--display);font-size:13px;color:var(--text-ghost);min-width:32px}
.toc-item .ttl{font-family:var(--serif);font-size:16px;color:var(--text-mid);transition:color .2s}.toc-item:hover .ttl{color:var(--text)}
.reader{display:none;max-width:680px;margin:0 auto;padding:100px 24px 120px;min-height:100vh}.reader.active{display:block}
.reader .chapter-title{font-family:var(--display);font-size:clamp(24px,4vw,36px);font-weight:600;color:var(--text);text-align:center;margin-bottom:48px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.reader .body{font-family:var(--serif);font-size:clamp(15px,2.2vw,17px);line-height:2.0;color:var(--text);letter-spacing:.02em}
.reader .body p{margin-bottom:.4em}.reader .body p.empty{height:1.2em}.reader .body p.divider{text-align:center;color:var(--text-ghost);margin:2em 0;font-size:14px;letter-spacing:.5em}
.chapter-nav{display:flex;justify-content:space-between;align-items:center;margin-top:80px;padding-top:32px;border-top:1px solid var(--border);gap:16px}
.chapter-nav button{font-family:var(--sans);font-size:13px;color:var(--text-mid);background:var(--bg-card);border:1px solid var(--border);padding:12px 24px;border-radius:4px;cursor:pointer;transition:all .2s;max-width:45%}
.chapter-nav button:hover{border-color:var(--teal);color:var(--teal)}.chapter-nav button:disabled{opacity:.3;cursor:default}
.chapter-nav .toc-btn{font-size:12px;color:var(--text-dim);background:transparent;border:none;cursor:pointer;padding:8px 12px}.chapter-nav .toc-btn:hover{color:var(--teal)}
.site-footer{text-align:center;padding:40px 24px;font-size:12px;color:var(--text-ghost);border-top:1px solid var(--border)}
@media(max-width:768px){.site-header{padding:10px 16px}.site-header h1{font-size:14px}.hero{padding:80px 16px 40px}.wl-cards{flex-direction:column;align-items:center}.wl-card{width:100%;max-width:340px}.toc{padding:24px 20px 60px}.reader{padding:80px 20px 100px}.chapter-nav button{padding:10px 16px;font-size:12px}}
</style>
</head>
<body>
<div id="progress"></div>
<header class="site-header">
  <h1 onclick="showHome()">惑星イニル — Novels</h1>
  <a href="../">← World Codex</a>
</header>
<section class="hero" id="hero-section">
  <div class="universe-tag">Planet Inir — All Works</div>
  <h2>惑星イニルの物語</h2>
  <div class="section-label" style="color:var(--teal)">&#9312; はじめに読む</div>
  <div class="section-hint">どちらか1つから。灰の海は情報戦、祈りは辺境の教室。</div>
  <div class="wl-cards" id="cards-start"></div>
  <div class="section-label" style="color:var(--purple)">&#9313; 本編のあとに</div>
  <div class="section-hint">灰の海を読んだなら左の4作から。</div>
  <div class="wl-cards" id="cards-after"></div>
  <div class="section-label" style="color:var(--green)">&#9314; どこから読んでもいい</div>
  <div class="section-hint">日常、港、世界の原作層。本編を知らなくても入れる。</div>
  <div class="wl-cards" id="cards-any"></div>
  <div class="section-label" style="color:var(--ember)">&#9315; もっと深く</div>
  <div class="section-hint">世界の手触り、制度の裏側、帳簿の外。</div>
  <div class="wl-cards" id="cards-deep"></div>
</section>
<section class="toc" id="toc-section">
  <button class="back-btn" onclick="showHome()">&#8592; 作品一覧に戻る</button>
  <h3 id="toc-wl-label"></h3>
  <div class="toc-subtitle" id="toc-title"></div>
  <div id="toc-list"></div>
</section>
<section class="reader" id="reader-section">
  <h2 class="chapter-title" id="chapter-title"></h2>
  <div class="body" id="chapter-body"></div>
  <div class="chapter-nav">
    <button id="prev-btn" onclick="navChapter(-1)">&#8592; 前話</button>
    <button class="toc-btn" onclick="showToc()">目次</button>
    <button id="next-btn" onclick="navChapter(1)">次話 &#8594;</button>
  </div>
</section>
<footer class="site-footer"><p>惑星イニル</p></footer>
<script>
const NOVELS={
  wl1:{file:'chapters.json',label:'本編',title:'灰の海から届く声',cat:'start',desc:'情報統制の街で、調査者の女は三日間途絶えた回線を追う。消えた情報屋が最後に伝えたのは、名簿が先に作られているという事実だった。'},
  wl2:{file:'chapters_wl2.json',label:'本編',title:'祈りの届かない場所',cat:'start',desc:'信仰が正しさの源泉である世界で、追放された少女騎士はリムランドの教室に辿り着く。祈りの代わりに、割り算を教え始めた。'},
  gaiden_suzune:{file:'chapters_suzune.json',label:'灰の海 外伝',title:'遮熱通路の女',cat:'after',desc:'チガイの地下最深層で育った少女が、情報を武器に這い上がるまでの記録。'},
  gaiden_naginoha:{file:'chapters_naginoha.json',label:'灰の海 外伝',title:'凪の刀',cat:'after',desc:'山を降りた鬼族の少女が、刀を手に灰境を駆ける六日間。'},
  gaiden_haikyo:{file:'chapters_haikyo.json',label:'灰の海 外伝',title:'灰境の日々',cat:'after',desc:'配給日の市場、廃材楽器の夜、灰海の焚き火、猫を追う午後。'},
  gaiden_sannin:{file:'chapters_sannin.json',label:'灰の海 外伝',title:'三人の話',cat:'after'},
  gekkou:{file:'chapters_gekkou.json',label:'月虹遭難編',title:'月虹遭難編',cat:'after',desc:'怪異に追われ、辺境の家に泊まり、四人で湯に入る。警戒をどこまで解くか。',desc:'損得の外にある関係。すずね、メフィー、凪羽の距離が変わる四つの夜。'},
  nichijou_lisl:{file:'chapters_lisl.json',label:'照界の日常',title:'リィズルとアルス',cat:'any',desc:'冷却服を選んで、整備庫で昼寝して、補習を受けて、魚弁当を交換する。'},
  nichijou_myalka:{file:'chapters_myalka.json',label:'照界の日常',title:'ミャルカは今日も笑う',cat:'any',desc:'衣装合わせ、握手会、楽屋の桃。笑顔の裏側にある日常。'},
  seihon_choubo:{file:'chapters_choubo.json',label:'正本',title:'帳簿は合っている',cat:'any',desc:'義肢を渡す手が債務の鎖も編む。ナグロ親方の25年。'},
  seihon_utaeru:{file:'chapters_utaeru.json',label:'正本',title:'まだ歌える',cat:'any',desc:'災厄を予見しながら沈黙を選ぶ観測者。アズラの85年。'},
  seihon_anshin:{file:'chapters_anshin.json',label:'正本',title:'安心の設計者たち',cat:'any',desc:'嘘をつかずに安心を供給する技術。アルダーとルーセントの25年。'},
  seihon_nami:{file:'chapters_nami.json',label:'正本',title:'波が決める',cat:'any',desc:'海は誰のものでもない。のに、誰かのものになっていく。ウネリの30年。'},
  lattice:{file:'chapters_lattice.json',label:'ラティス',title:'ラティスですれ違わない日',cat:'any',desc:'港で偶然すれ違うだけの五つの話。苦い茶、魚串、薬草、ぬるいスープ、祭りの飴。'},
  fukabori:{file:'chapters_fukabori.json',label:'深掘り短編',title:'イニル深掘り短編',cat:'deep',desc:'義肢工房、食卓、検査日、薄域紀行、通関、灰海、祈歌、配給、追跡、地下、合成人間、灰犬課、星図、造船、冷却服。十五編。'},
  chigai:{file:'chapters_chigai.json',label:'シリーズ',title:'チガイ下層見聞',cat:'deep',desc:'天井が低い。水が落ちる。紙が通貨。文字を覚えると殴られる。地下から見た世界。'},
  hakuiki:{file:'chapters_hakuiki.json',label:'シリーズ',title:'粒子薄域紀行',cat:'deep',desc:'火が弱い。茶が出ない。声が消える。粒子がない場所を身体で読む五日間。'},
  tsuukan:{file:'chapters_tsuukan.json',label:'シリーズ',title:'港湾通関日誌',cat:'deep',desc:'書類一枚で人も荷も運命が変わる。通すか止めるか、六十一回。'},
  shokutaku:{file:'chapters_shokutaku.json',label:'シリーズ',title:'境界の食卓',cat:'any',desc:'同じ食べるが文明で全部違う。鍋、定食、茸汁、船飯、病人食。匂いで読む五話。'},
  api:{file:'chapters_api.json',label:'シリーズ',title:'AP-I検査日',cat:'deep',desc:'列に並ぶだけで怖い。番号を呼ばれるだけで人生が揺れる。照界の制度を身体で読む五話。'},
  gishi:{file:'chapters_gishi.json',label:'シリーズ',title:'義肢工房録',cat:'deep',desc:'削る、合わせる、失敗する、痛む。義肢が身体と生活の境界だとわかる五話。'},
  setsubi:{file:'chapters_setsubi.json',label:'シリーズ',title:'設備と呼ばれた日々',cat:'deep',desc:'合成人間ヨハナの内側。0.8秒の起動、0.9秒の逸脱、味噌汁の温度、桃の味。'},
  itsume:{file:'chapters_itsume.json',label:'シリーズ',title:'鋳爪商会帳簿外',cat:'deep',desc:'帳簿に載らない経済。ドーラの七十二年と、足をぶらぶらさせる椅子。'},
  kenmon:{file:'chapters_kenmon.json',label:'シリーズ',title:'検問灯の下で',cat:'deep',desc:'取り締まる側から見た灰境。異常なし、と書く夜。'},
};
let chapters=[],currentChapter=-1,currentWL='';
function showHome(){document.getElementById('hero-section').style.display='flex';document.getElementById('toc-section').style.display='none';document.getElementById('reader-section').classList.remove('active');document.querySelector('.site-header h1').textContent='惑星イニル — Novels';window.scrollTo(0,0);}
function buildCards(){const groups={start:'cards-start',after:'cards-after',any:'cards-any',deep:'cards-deep'};for(const[key,novel] of Object.entries(NOVELS)){const c=document.getElementById(groups[novel.cat]);if(!c)continue;const d=document.createElement('div');d.className='wl-card cat-'+novel.cat;d.onclick=()=>selectWL(key);d.innerHTML='<div class="wl-num">'+novel.label+'</div><div class="wl-title">'+novel.title+'</div><div class="wl-desc">'+novel.desc+'</div>';c.appendChild(d);}}
async function selectWL(wl){currentWL=wl;const novel=NOVELS[wl];const res=await fetch(novel.file);chapters=await res.json();document.querySelector('.site-header h1').textContent=novel.title;showToc();}
function showToc(){const novel=NOVELS[currentWL];document.getElementById('hero-section').style.display='none';document.getElementById('toc-section').style.display='block';document.getElementById('reader-section').classList.remove('active');document.getElementById('toc-wl-label').textContent=novel.label;document.getElementById('toc-title').textContent=novel.title;const list=document.getElementById('toc-list');list.innerHTML='';const read=JSON.parse(localStorage.getItem(currentWL+'-read')||'[]');chapters.forEach((ch,i)=>{const item=document.createElement('div');item.className='toc-item'+(read.includes(i)?' read':'');const isEp=ch.title.includes('エピローグ');const isInter=ch.title.includes('間章');let label=isEp?'Ep':isInter?'間':String(i+1).padStart(2,'0');item.innerHTML='<span class="num">'+label+'</span><span class="ttl">'+ch.title+'</span>';item.onclick=()=>loadChapter(i);list.appendChild(item);});window.scrollTo(0,0);}
function loadChapter(idx){if(idx<0||idx>=chapters.length)return;currentChapter=idx;document.getElementById('hero-section').style.display='none';document.getElementById('toc-section').style.display='none';document.getElementById('reader-section').classList.add('active');const ch=chapters[idx];document.getElementById('chapter-title').textContent=ch.title;const body=document.getElementById('chapter-body');body.innerHTML='';ch.body.split('\n').forEach(line=>{const p=document.createElement('p');const t=line.trim();if(t==='')p.className='empty';else if(t==='*'){p.className='divider';p.textContent='\uFF0A';}else p.textContent=t;body.appendChild(p);});document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===chapters.length-1;document.getElementById('next-btn').textContent=idx===chapters.length-1?'\u2014 完 \u2014':'\u6B21\u8A71 \u2192';markRead(idx);window.scrollTo(0,0);}
function navChapter(d){loadChapter(currentChapter+d);}
function markRead(idx){const key=currentWL+'-read';const read=JSON.parse(localStorage.getItem(key)||'[]');if(!read.includes(idx)){read.push(idx);localStorage.setItem(key,JSON.stringify(read));}}
window.addEventListener('scroll',()=>{const h=document.documentElement;document.getElementById('progress').style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100+'%';});
buildCards();
</script>
</body>
</html>
