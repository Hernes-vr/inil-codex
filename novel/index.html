<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta property="og:title" content="惑星イニル — Novels">
<meta property="og:description" content="惑星イニルの物語。二つのワールドライン。">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>惑星イニル — Novels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
:root{--bg:#06070c;--bg-card:#0c0e18;--bg-surface:#101320;--border:rgba(255,255,255,0.05);--amber:#e0a535;--teal:#4eb8d6;--purple:#7e8fd4;--ember:#9a8e7c;--text:#e0dcd4;--text-mid:rgba(255,255,255,0.65);--text-dim:rgba(255,255,255,0.45);--text-ghost:rgba(255,255,255,0.22);--serif:'Noto Serif JP','Cormorant Garamond',serif;--sans:'Noto Sans JP',sans-serif;--display:'Cormorant Garamond','Noto Serif JP',serif}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;background:var(--bg)}body{font-family:var(--sans);color:var(--text);background:var(--bg);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
#progress{position:fixed;top:0;left:0;height:2px;z-index:1000;background:linear-gradient(90deg,var(--amber),var(--teal));width:0%;transition:width .15s}
.site-header{position:fixed;top:0;left:0;right:0;z-index:900;background:rgba(6,7,12,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.site-header h1{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--text-mid);letter-spacing:.04em;cursor:pointer}.site-header a{color:var(--text-dim);text-decoration:none;font-size:13px;transition:color .2s}.site-header a:hover{color:var(--teal)}
.hero{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 24px 60px;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(transparent,var(--bg))}
.hero .universe-tag{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:32px}
.hero h2{font-family:var(--display);font-size:clamp(28px,5vw,44px);font-weight:600;color:var(--text);line-height:1.3;margin-bottom:40px}
.wl-cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;max-width:800px;position:relative;z-index:10}
.wl-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:32px 28px;width:340px;text-align:left;cursor:pointer;transition:all .3s}
.wl-card:hover{border-color:var(--amber);transform:translateY(-2px)}
.wl-card .wl-num{font-family:var(--sans);font-size:11px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px}
.wl-card.wl1 .wl-num{color:var(--teal)}.wl-card.wl2 .wl-num{color:var(--purple)}
.wl-card .wl-title{font-family:var(--serif);font-size:20px;color:var(--text);margin-bottom:12px}
.wl-card .wl-desc{font-size:13px;color:var(--text-mid);line-height:1.7;margin-bottom:16px}
.wl-card .wl-catch{font-family:var(--serif);font-size:13px;color:var(--amber);font-style:italic}
.toc{max-width:640px;margin:0 auto;padding:40px 24px 80px;display:none}
.toc h3{font-family:var(--serif);font-size:14px;color:var(--text-dim);letter-spacing:.15em;margin-bottom:8px;text-transform:uppercase}
.toc .toc-subtitle{font-family:var(--serif);font-size:18px;color:var(--text-mid);margin-bottom:24px}
.toc .back-btn{font-size:12px;color:var(--text-dim);background:none;border:none;cursor:pointer;margin-bottom:20px;padding:4px 0}.toc .back-btn:hover{color:var(--teal)}
.toc-item{display:flex;align-items:baseline;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s}
.toc-item:hover{padding-left:8px}.toc-item .num{font-family:var(--display);font-size:13px;color:var(--text-ghost);min-width:32px}
.toc-item .ttl{font-family:var(--serif);font-size:16px;color:var(--text-mid);transition:color .2s}.toc-item:hover .ttl{color:var(--text)}
.toc-item.read .ttl{color:var(--text-dim)}.toc-item.read .num::after{content:' ✓';color:var(--teal);font-size:11px}
.reader{display:none;max-width:680px;margin:0 auto;padding:100px 24px 120px;min-height:100vh}.reader.active{display:block}
.reader .chapter-title{font-family:var(--display);font-size:clamp(24px,4vw,36px);font-weight:600;color:var(--text);text-align:center;margin-bottom:48px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.reader .body{font-family:var(--serif);font-size:clamp(15px,2.2vw,17px);line-height:2.0;color:var(--text);letter-spacing:.02em}
.reader .body p{margin-bottom:.4em}.reader .body p.empty{height:1.2em}.reader .body p.divider{text-align:center;color:var(--text-ghost);margin:2em 0;font-size:14px;letter-spacing:.5em}
.chapter-nav{display:flex;justify-content:space-between;align-items:center;margin-top:80px;padding-top:32px;border-top:1px solid var(--border);gap:16px}
.chapter-nav button{font-family:var(--sans);font-size:13px;color:var(--text-mid);background:var(--bg-card);border:1px solid var(--border);padding:12px 24px;border-radius:4px;cursor:pointer;transition:all .2s;max-width:45%}
.chapter-nav button:hover{border-color:var(--teal);color:var(--teal)}.chapter-nav button:disabled{opacity:.3;cursor:default}
.chapter-nav .toc-btn{font-size:12px;color:var(--text-dim);background:transparent;border:none;cursor:pointer;padding:8px 12px}.chapter-nav .toc-btn:hover{color:var(--teal)}
.site-footer{text-align:center;padding:40px 24px;font-size:12px;color:var(--text-ghost);border-top:1px solid var(--border)}.site-footer a{color:var(--text-dim);text-decoration:none}.site-footer a:hover{color:var(--teal)}
@media(max-width:768px){.site-header{padding:10px 16px}.site-header h1{font-size:14px}.hero{min-height:60vh;padding:100px 20px 40px}.wl-cards{flex-direction:column;align-items:center}.wl-card{width:100%;max-width:340px}.toc{padding:24px 20px 60px}.reader{padding:80px 20px 100px}.chapter-nav button{padding:10px 16px;font-size:12px}}
</style>
</head>
<body>
<div id="progress"></div>
<header class="site-header">
  <h1 onclick="showHome()">惑星イニル — Novels</h1>
  <a href="../">← World Codex</a>
</header>

<section class="hero" id="hero-section">
  <div class="universe-tag">Planet Inir — Worldlines</div>
  <h2>惑星イニルの物語</h2>
  <div class="wl-cards">
    <div class="wl-card wl1" onclick="selectWL('wl1')">
      <div class="wl-num">Worldline 01</div>
      <div class="wl-title">灰の海から届く声</div>
      <div class="wl-desc">情報統制の街で、調査者の女は三日間途絶えた回線を追う。消えた情報屋が最後に伝えたのは、名簿が先に作られているという事実だった。</div>
      <div class="wl-catch">全20話 + エピローグ</div>
    </div>
    <div class="wl-card wl2" onclick="selectWL('wl2')">
      <div class="wl-num">Worldline 02</div>
      <div class="wl-title">祈りの届かない場所</div>
      <div class="wl-desc">信仰が正しさの源泉である世界で、追放された少女騎士はリムランドの教室に辿り着く。祈りの代わりに、割り算を教え始めた。</div>
      <div class="wl-catch">全16話 + エピローグ</div>
    </div>
  </div>
</section>

<section class="toc" id="toc-section">
  <button class="back-btn" onclick="showHome()">← 作品一覧に戻る</button>
  <h3 id="toc-wl-label"></h3>
  <div class="toc-subtitle" id="toc-title"></div>
  <div id="toc-list"></div>
</section>

<section class="reader" id="reader-section">
  <h2 class="chapter-title" id="chapter-title"></h2>
  <div class="body" id="chapter-body"></div>
  <div class="chapter-nav">
    <button id="prev-btn" onclick="navChapter(-1)">← 前話</button>
    <button class="toc-btn" onclick="showToc()">目次</button>
    <button id="next-btn" onclick="navChapter(1)">次話 →</button>
  </div>
</section>

<footer class="site-footer">
  <p>惑星イニル — <a href="../">World Codex</a></p>
</footer>

<script>
const NOVELS = {
  wl1: { file:'chapters.json', label:'Worldline 01', title:'灰の海から届く声', key:'inil-wl1' },
  wl2: { file:'chapters_wl2.json', label:'Worldline 02', title:'祈りの届かない場所', key:'inil-wl2' }
};
let chapters=[], currentChapter=-1, currentWL='';

function showHome(){
  document.getElementById('hero-section').style.display='flex';
  document.getElementById('toc-section').style.display='none';
  document.getElementById('reader-section').classList.remove('active');
  document.querySelector('.site-header h1').textContent='惑星イニル — Novels';
  window.scrollTo(0,0);
}

async function selectWL(wl){
  currentWL=wl;
  const novel=NOVELS[wl];
  const res=await fetch(novel.file);
  chapters=await res.json();
  document.querySelector('.site-header h1').textContent=novel.title;
  showToc();
}

function showToc(){
  const novel=NOVELS[currentWL];
  document.getElementById('hero-section').style.display='none';
  document.getElementById('toc-section').style.display='block';
  document.getElementById('reader-section').classList.remove('active');
  document.getElementById('toc-wl-label').textContent=novel.label;
  document.getElementById('toc-title').textContent=novel.title;
  const list=document.getElementById('toc-list');
  list.innerHTML='';
  const read=JSON.parse(localStorage.getItem(novel.key+'-read')||'[]');
  chapters.forEach((ch,i)=>{
    const item=document.createElement('div');
    item.className='toc-item'+(read.includes(i)?' read':'');
    const isEp=ch.title.includes('エピローグ');
    item.innerHTML=`<span class="num">${isEp?'Ep':String(i+1).padStart(2,'0')}</span><span class="ttl">${ch.title}</span>`;
    item.onclick=()=>loadChapter(i);
    list.appendChild(item);
  });
  window.scrollTo(0,0);
}

function loadChapter(idx){
  if(idx<0||idx>=chapters.length)return;
  currentChapter=idx;
  document.getElementById('hero-section').style.display='none';
  document.getElementById('toc-section').style.display='none';
  document.getElementById('reader-section').classList.add('active');
  const ch=chapters[idx];
  document.getElementById('chapter-title').textContent=ch.title;
  const body=document.getElementById('chapter-body');
  body.innerHTML='';
  ch.body.split('\n').forEach(line=>{
    const p=document.createElement('p');
    const t=line.trim();
    if(t==='')p.className='empty';
    else if(t==='*'){p.className='divider';p.textContent='＊';}
    else p.textContent=t;
    body.appendChild(p);
  });
  document.getElementById('prev-btn').disabled=idx===0;
  document.getElementById('next-btn').disabled=idx===chapters.length-1;
  document.getElementById('next-btn').textContent=idx===chapters.length-1?'— 完 —':'次話 →';
  markRead(idx);
  window.scrollTo(0,0);
}

function navChapter(d){loadChapter(currentChapter+d);}
function markRead(idx){
  const key=NOVELS[currentWL].key+'-read';
  const read=JSON.parse(localStorage.getItem(key)||'[]');
  if(!read.includes(idx)){read.push(idx);localStorage.setItem(key,JSON.stringify(read));}
}
window.addEventListener('scroll',()=>{
  const h=document.documentElement;
  document.getElementById('progress').style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100+'%';
});
</script>
</body>
</html>
